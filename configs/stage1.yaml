# Stage 1 (Gaussian noise -> treated latent) defaults.
#
# Real-data Stage 1 smoke on the RTX PRO 6000 Blackwell:
#
#   python -m cellfluxv2.train.stage1 \
#     --config configs/stage1.yaml \
#     --device cuda \
#     --batch-size 128 \
#     --num-workers 4 \
#     --max-steps 2000 \
#     --output-dir runs/stage1_gpu_smoke
#
# `seed` is global; `data.rng_seed` is the dataset's per-item seed (independent
# of the global one so that flipping global seeds does not silently change the
# dataset's __getitem__ outputs).

seed: 0
stage: 1

model:
  hidden_dim: 384
  depth: 6
  num_heads: 6
  dropout: 0.0

training:
  batch_size: 128
  lr: 2.0e-4
  weight_decay: 0.01
  grad_clip_norm: 1.0
  path_type: noisy
  path_sigma: 1.0
  source_noise_p: 0.0
  source_noise_sigma: 0.0
  cond_dropout_p: 0.1
  max_steps: 2000
  log_interval: 20
  diagnostic_interval: 200
  checkpoint_interval: 500
  num_workers: 4
  device: cuda

data:
  metadata_path: 2DGen/data/rxrx3_core/metadata_rxrx3_core_normalized.csv
  latent_root: /teamspace/gcs_connections/sentinal4d/imaging/2d/single_cell/rxrx/rxrx3-core/features/rxrx3_core_mae_latents
  fingerprints_path: data/fingerprints_morgan_r2_b1024.npz
  norm_stats_path: 2DGen/data/rxrx3_core/norm_stats_controls.pt
  missing_addresses_path: data/missing_addresses.csv
  rng_seed: 0
  plate_cache_max_plates: 8
